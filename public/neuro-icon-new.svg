<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Dark circle background -->
  <circle cx="20" cy="20" r="20" fill="#1a1a1a"/>

  <!-- Network nodes (white circles) -->
  <circle cx="20" cy="8" r="2.5" fill="white"/>
  <circle cx="28" cy="15" r="2.5" fill="white"/>
  <circle cx="32" cy="24" r="2.5" fill="white"/>
  <circle cx="28" cy="33" r="2.5" fill="white"/>
  <circle cx="20" cy="32" r="2.5" fill="white"/>
  <circle cx="12" cy="33" r="2.5" fill="white"/>
  <circle cx="8" cy="24" r="2.5" fill="white"/>
  <circle cx="12" cy="15" r="2.5" fill="white"/>
  <circle cx="20" cy="20" r="3" fill="white"/>

  <!-- Connecting lines -->
  <line x1="20" y1="8" x2="28" y2="15" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="15" x2="32" y2="24" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="24" x2="28" y2="33" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="33" x2="20" y2="32" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="32" x2="12" y2="33" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="33" x2="8" y2="24" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="8" y1="24" x2="12" y2="15" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="15" x2="20" y2="8" stroke="white" stroke-width="1" opacity="0.6"/>

  <!-- Lines to center -->
  <line x1="20" y1="8" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="15" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="24" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="33" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="32" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="12" y1="33" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="8" y1="24" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="12" y1="15" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
</svg>